kind = "web"
previewPath = "/"
title = "Deriv Trading Chart"
version = "1.0.0"
id = "artifacts/deriv-chart"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22665
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/deriv-chart run dev"

[services.env]
PORT = "22665"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/deriv-chart", "run", "build"]
publicDir = "artifacts/deriv-chart/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
